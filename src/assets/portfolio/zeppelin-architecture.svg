<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1080" role="img" aria-labelledby="title description">
  <title id="title">Apache Zeppelin interpreter isolation</title>
  <desc id="description">Before containerization, Zeppelin Server and multiple interpreters, including Flink, JDBC, and Spark, share one Kubernetes Pod and one resource boundary. After containerization, the server and each interpreter run in separate Pods connected through RPC, isolating resources and allowing independent scaling.</desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="before-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="after-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="145%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#2563EB"/>
    </marker>
    <symbol id="logo-zeppelin" viewBox="0 0 48 48">
      <ellipse cx="24" cy="23" rx="19" ry="11.5" fill="#2B78A9"/>
      <path d="M7 24c7-6 18-10 33-8M9 28c8-4 18-6 30-5M16 34l8-3 8 2" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M8 21 3 18v10l5-3" fill="#2B78A9"/>
    </symbol>
    <symbol id="logo-kubernetes" viewBox="0 0 48 48">
      <path d="M24 3 42 13v22L24 45 6 35V13Z" fill="#326CE5"/>
      <circle cx="24" cy="24" r="8" fill="none" stroke="#FFFFFF" stroke-width="2.6"/>
      <circle cx="24" cy="24" r="2.5" fill="#FFFFFF"/>
      <path d="M24 9v7M24 32v7M9 24h7M32 24h7M13.5 13.5l5 5M29.5 29.5l5 5M34.5 13.5l-5 5M18.5 29.5l-5 5" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <style>
    text { font-family: Inter, Pretendard, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
    .title { font-size: 32px; font-weight: 800; letter-spacing: -0.8px; }
    .subtitle { font-size: 18px; fill: #64748B; }
    .panel-title { font-size: 22px; font-weight: 800; letter-spacing: 0.25px; }
    .pod-title { font-size: 20px; font-weight: 750; }
    .node-title { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
    .chip { font-size: 17px; font-weight: 800; letter-spacing: 0.2px; }
    .outcome { font-size: 16px; font-weight: 800; }
    .edge-label { font-size: 18px; font-weight: 800; fill: #475569; paint-order: stroke; stroke: #F8FAFC; stroke-width: 6px; stroke-linejoin: round; }
    .node { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; }
    .rpc { fill: none; stroke: #475569; stroke-width: 3; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    .rpc-blue { fill: none; stroke: #2563EB; stroke-width: 3; marker-end: url(#arrow-blue); stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="1080" fill="url(#page)"/>
  <text class="title" x="40" y="52">Apache Zeppelin Interpreter Isolation</text>
  <text class="subtitle" x="40" y="82">One shared Pod → isolated interpreter Pods</text>

  <!-- Before: every process shares one Pod and resource boundary. -->
  <rect x="40" y="130" width="720" height="330" rx="26" fill="url(#before-panel)" stroke="#FDBA74" stroke-width="2"/>
  <rect x="64" y="108" width="390" height="44" rx="22" fill="#FFEDD5" stroke="#FDBA74"/>
  <circle cx="89" cy="130" r="7" fill="#EA580C"/>
  <text class="panel-title" x="108" y="137" fill="#9A3412">BEFORE · ONE SHARED POD</text>

  <rect x="68" y="172" width="664" height="246" rx="22" fill="#FFFFFF" fill-opacity="0.86" stroke="#94A3B8" stroke-width="2"/>
  <use href="#logo-kubernetes" x="90" y="187" width="30" height="30" aria-hidden="true"/>
  <text class="pod-title" x="132" y="210">Kubernetes Pod · shared resource boundary</text>

  <path class="rpc" d="M400 287V310H178V331"/>
  <path class="rpc" d="M400 310V331"/>
  <path class="rpc" d="M400 310H622V331"/>
  <text class="edge-label" x="415" y="306">RPC</text>

  <g filter="url(#shadow)">
    <rect class="node" x="150" y="226" width="500" height="62" rx="16"/>
    <use href="#logo-zeppelin" x="170" y="237" width="40" height="40" aria-hidden="true"/>
    <text class="node-title" x="226" y="265">Zeppelin Server</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="node" x="92" y="331" width="172" height="58" rx="15"/>
    <circle cx="119" cy="360" r="15" fill="#2563EB"/>
    <text x="119" y="366" text-anchor="middle" font-size="15" font-weight="850" fill="#FFFFFF">F</text>
    <text class="node-title" x="145" y="368">Flink</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="node" x="314" y="331" width="172" height="58" rx="15"/>
    <circle cx="341" cy="360" r="15" fill="#475569"/>
    <text x="341" y="365" text-anchor="middle" font-size="12" font-weight="850" fill="#FFFFFF">DB</text>
    <text class="node-title" x="367" y="368">JDBC</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="node" x="536" y="331" width="172" height="58" rx="15"/>
    <circle cx="563" cy="360" r="15" fill="#F97316"/>
    <text x="563" y="366" text-anchor="middle" font-size="15" font-weight="850" fill="#FFFFFF">S</text>
    <text class="node-title" x="589" y="368">Spark</text>
  </g>

  <rect x="92" y="400" width="616" height="42" rx="14" fill="#FFF1F2" stroke="#FDA4AF"/>
  <circle cx="117" cy="421" r="12" fill="#E11D48"/>
  <path d="M117 414v8m0 5h.01" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <text class="chip" x="140" y="427" fill="#BE123C">SHARED CPU · MEMORY · FAILURE IMPACT</text>

  <!-- Transformation -->
  <path d="M400 479V548" fill="none" stroke="#2563EB" stroke-width="7" marker-end="url(#arrow-blue)" stroke-linecap="round"/>
  <rect x="431" y="491" width="244" height="42" rx="21" fill="#DBEAFE"/>
  <text class="chip" x="553" y="518" text-anchor="middle" fill="#1D4ED8">CONTAINERIZE · ISOLATE</text>

  <!-- After: the server and each interpreter have independent Pods. -->
  <rect x="40" y="585" width="720" height="435" rx="26" fill="url(#after-panel)" stroke="#818CF8" stroke-width="2"/>
  <rect x="64" y="563" width="490" height="44" rx="22" fill="#E0E7FF" stroke="#818CF8"/>
  <circle cx="89" cy="585" r="7" fill="#4F46E5"/>
  <text class="panel-title" x="108" y="592" fill="#3730A3">AFTER · ONE POD PER INTERPRETER</text>

  <g filter="url(#shadow)">
    <rect x="88" y="630" width="624" height="92" rx="18" fill="#EEF2FF" stroke="#818CF8" stroke-width="2"/>
    <rect x="106" y="646" width="58" height="28" rx="14" fill="#FFFFFF"/>
    <text class="chip" x="135" y="665" text-anchor="middle" fill="#4338CA">POD</text>
    <use href="#logo-zeppelin" x="184" y="649" width="46" height="46" aria-hidden="true"/>
    <text class="node-title" x="247" y="681">Zeppelin Server</text>
  </g>

  <path class="rpc-blue" d="M400 722V765H184V796"/>
  <path class="rpc-blue" d="M400 765V796"/>
  <path class="rpc-blue" d="M400 765H616V796"/>
  <text class="edge-label" x="417" y="759" fill="#1D4ED8">RPC</text>

  <g filter="url(#shadow)">
    <rect x="88" y="796" width="192" height="120" rx="18" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
    <rect x="104" y="812" width="52" height="26" rx="13" fill="#FFFFFF"/>
    <text class="chip" x="130" y="830" text-anchor="middle" fill="#1D4ED8">POD</text>
    <circle cx="126" cy="868" r="18" fill="#2563EB"/>
    <text x="126" y="875" text-anchor="middle" font-size="17" font-weight="850" fill="#FFFFFF">F</text>
    <text class="node-title" x="158" y="875">Flink</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="304" y="796" width="192" height="120" rx="18" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
    <rect x="320" y="812" width="52" height="26" rx="13" fill="#FFFFFF"/>
    <text class="chip" x="346" y="830" text-anchor="middle">POD</text>
    <circle cx="342" cy="868" r="18" fill="#475569"/>
    <text x="342" y="874" text-anchor="middle" font-size="13" font-weight="850" fill="#FFFFFF">DB</text>
    <text class="node-title" x="374" y="875">JDBC</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="796" width="192" height="120" rx="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <rect x="536" y="812" width="52" height="26" rx="13" fill="#FFFFFF"/>
    <text class="chip" x="562" y="830" text-anchor="middle" fill="#C2410C">POD</text>
    <circle cx="558" cy="868" r="18" fill="#F97316"/>
    <text x="558" y="875" text-anchor="middle" font-size="17" font-weight="850" fill="#FFFFFF">S</text>
    <text class="node-title" x="590" y="875">Spark</text>
  </g>

  <g transform="translate(46 946)">
    <rect width="232" height="44" rx="22" fill="#DBEAFE"/>
    <circle cx="23" cy="22" r="7" fill="#2563EB"/>
    <text class="outcome" x="40" y="28" fill="#1D4ED8">RESOURCE ISOLATION</text>
  </g>
  <g transform="translate(284 946)">
    <rect width="232" height="44" rx="22" fill="#E0E7FF"/>
    <circle cx="23" cy="22" r="7" fill="#4F46E5"/>
    <text class="outcome" x="40" y="28" fill="#3730A3">INDEPENDENT SCALE</text>
  </g>
  <g transform="translate(522 946)">
    <rect width="232" height="44" rx="22" fill="#ECFDF5"/>
    <circle cx="23" cy="22" r="7" fill="#059669"/>
    <text class="outcome" x="40" y="28" fill="#047857">CONTAINED IMPACT</text>
  </g>
</svg>
