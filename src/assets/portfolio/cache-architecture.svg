<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Multi-level cache architecture</title>
  <desc id="description">The application reads and writes through CompositeCache, which checks Caffeine L1 before Redis L2. After both caches miss, a circuit breaker guards the call to the Kurly source API and returns a fallback response when open. Cache eviction events are published through Redis Pub/Sub so other application instances evict their local L1 entries. Eleven policy profiles define time-to-live values from 30 minutes to seven days and local cache size limits.</desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="caffeine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="redis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF1F2"/>
      <stop offset="1" stop-color="#FFE4E6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#334155"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#EA580C"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#7C3AED"/>
    </marker>
  </defs>

  <style>
    text { font-family: Inter, Pretendard, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
    .title { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
    .subtitle { font-size: 18px; fill: #64748B; }
    .boundary-title { font-size: 18px; font-weight: 750; }
    .node-title { font-size: 22px; font-weight: 800; letter-spacing: -0.35px; }
    .node-subtitle { font-size: 16px; fill: #64748B; }
    .metric { font-size: 20px; font-weight: 800; }
    .label { font-size: 15px; font-weight: 700; fill: #475569; paint-order: stroke; stroke: #F8FAFC; stroke-width: 6px; stroke-linejoin: round; }
    .tiny { font-size: 14px; fill: #64748B; }
    .pill { font-size: 14px; font-weight: 800; letter-spacing: 0.45px; }
    .node { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; }
    .read { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    .invalidate { fill: none; stroke: #EA580C; stroke-width: 3; marker-end: url(#arrow-orange); stroke-linecap: round; stroke-linejoin: round; }
    .fallback { fill: none; stroke: #7C3AED; stroke-width: 3; stroke-dasharray: 9 7; marker-end: url(#arrow-purple); stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1600" height="900" fill="url(#page)"/>

  <text class="title" x="60" y="62">Multi-level Cache Architecture</text>
  <text class="subtitle" x="60" y="94">Fast local reads · shared Redis fallback · guarded source API</text>

  <g transform="translate(1132 46)">
    <rect width="118" height="34" rx="17" fill="#E2E8F0"/>
    <circle cx="18" cy="17" r="5" fill="#334155"/>
    <text class="pill" x="31" y="22">READ PATH</text>
  </g>
  <g transform="translate(1262 46)">
    <rect width="152" height="34" rx="17" fill="#FFEDD5"/>
    <circle cx="18" cy="17" r="5" fill="#EA580C"/>
    <text class="pill" x="31" y="22" fill="#9A3412">INVALIDATION</text>
  </g>
  <g transform="translate(1426 46)">
    <rect width="120" height="34" rx="17" fill="#EDE9FE"/>
    <circle cx="18" cy="17" r="5" fill="#7C3AED"/>
    <text class="pill" x="31" y="22" fill="#5B21B6">FALLBACK</text>
  </g>
  <rect x="60" y="130" width="1020" height="370" rx="24" fill="#FFFFFF" fill-opacity="0.78" stroke="#94A3B8" stroke-width="2"/>
  <rect x="86" y="110" width="244" height="42" rx="21" fill="#E2E8F0" stroke="#94A3B8"/>
  <circle cx="109" cy="131" r="7" fill="#475569"/>
  <text class="boundary-title" x="127" y="137">Application instance A</text>

  <g transform="translate(342 164)">
    <rect width="660" height="44" rx="22" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text class="pill" x="330" y="28" text-anchor="middle" fill="#4338CA">11 POLICY PROFILES · TTL 30 MIN–7 DAYS · MAX SIZE 1,000</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="node" x="105" y="275" width="220" height="118" rx="18"/>
    <rect x="124" y="296" width="46" height="46" rx="12" fill="#E0E7FF"/>
    <path d="M137 319h20M151 312l7 7-7 7" fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="node-title" x="187" y="330">Application</text>
    <text class="node-subtitle" x="124" y="373">Cache client &amp; loader</text>
  </g>

  <g filter="url(#shadow)" transform="translate(-205 0)">
    <rect class="node" x="595" y="275" width="300" height="118" rx="18"/>
    <rect x="614" y="296" width="46" height="46" rx="12" fill="#FEF3C7"/>
    <path d="M625 309h24v9h-24zM625 323h24v9h-24z" fill="none" stroke="#B45309" stroke-width="2.4" stroke-linejoin="round"/>
    <text class="node-title" x="675" y="330">CompositeCache</text>
    <text class="node-subtitle" x="614" y="373">Read L1 → L2 · write both</text>
  </g>

  <g filter="url(#shadow)" transform="translate(-60 0)">
    <rect x="840" y="248" width="200" height="172" rx="20" fill="url(#caffeine)" stroke="#6EE7B7" stroke-width="2"/>
    <circle cx="885" cy="294" r="23" fill="#059669"/>
    <path d="M875 294h20M885 284v20" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <text class="node-title" x="920" y="292">L1</text>
    <text class="node-title" x="920" y="320">Caffeine</text>
    <text class="metric" x="865" y="365" fill="#047857">~10 ms</text>
    <text class="node-subtitle" x="865" y="394">Per-instance memory</text>
  </g>

  <path class="read" d="M325 334H390" marker-start="url(#arrow)"/>
  <text class="label" x="330" y="318">get · put</text>
  <path class="read" d="M690 334H780"/>
  <text class="label" x="701" y="318">read first</text>

  <rect x="1120" y="130" width="420" height="370" rx="24" fill="#FFFFFF" fill-opacity="0.78" stroke="#FDA4AF" stroke-width="2"/>
  <rect x="1146" y="110" width="190" height="42" rx="21" fill="#FFE4E6" stroke="#FDA4AF"/>
  <circle cx="1169" cy="131" r="7" fill="#E11D48"/>
  <text class="boundary-title" x="1187" y="137">Shared Redis</text>

  <g filter="url(#shadow)" transform="translate(0 -25)">
    <rect x="1170" y="226" width="320" height="174" rx="20" fill="url(#redis)" stroke="#FDA4AF" stroke-width="2"/>
    <ellipse cx="1220" cy="276" rx="24" ry="10" fill="#E11D48"/>
    <path d="M1196 276v32c0 6 11 10 24 10s24-4 24-10v-32M1196 292c0 6 11 10 24 10s24-4 24-10" fill="#E11D48" stroke="#BE123C" stroke-width="2"/>
    <text class="node-title" x="1263" y="284">L2 · Redis</text>
    <text class="metric" x="1196" y="349" fill="#BE123C">50–100 ms</text>
    <text class="node-subtitle" x="1196" y="378">Shared cache · master/replica</text>
  </g>

  <g filter="url(#shadow)" transform="translate(0 -50)">
    <rect class="node" x="1170" y="444" width="320" height="96" rx="18"/>
    <circle cx="1214" cy="492" r="22" fill="#FFF7ED" stroke="#FDBA74"/>
    <path d="M1203 492h22M1208 484l-7 8 7 8M1220 484l7 8-7 8" fill="none" stroke="#EA580C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="node-title" x="1250" y="486">Redis Pub/Sub</text>
    <text class="node-subtitle" x="1250" y="512">cache:evict</text>
  </g>

  <path class="read" d="M980 334H1170"/>
  <text class="label" x="1040" y="318">on miss</text>
  <path class="invalidate" d="M540 393V442H1170"/>
  <text class="label" x="720" y="426" fill="#C2410C">evict → publish</text>

  <rect x="500" y="638" width="580" height="200" rx="24" fill="#FFFFFF" fill-opacity="0.78" stroke="#94A3B8" stroke-width="2"/>
  <rect x="526" y="618" width="286" height="42" rx="21" fill="#E2E8F0" stroke="#94A3B8"/>
  <circle cx="549" cy="639" r="7" fill="#475569"/>
  <text class="boundary-title" x="567" y="645">Application instances B–N</text>

  <g filter="url(#shadow)">
    <rect x="530" y="694" width="240" height="98" rx="18" fill="url(#caffeine)" stroke="#6EE7B7" stroke-width="2"/>
    <circle cx="572" cy="743" r="20" fill="#059669"/>
    <path d="M563 743h18M572 734v18" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round"/>
    <text class="node-title" x="605" y="738">Instance B · L1</text>
    <text class="node-subtitle" x="605" y="765">Evict local entry</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="694" width="240" height="98" rx="18" fill="url(#caffeine)" stroke="#6EE7B7" stroke-width="2"/>
    <circle cx="842" cy="743" r="20" fill="#059669"/>
    <path d="M833 743h18M842 734v18" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round"/>
    <text class="node-title" x="875" y="738">Instance N · L1</text>
    <text class="node-subtitle" x="875" y="765">Evict local entry</text>
  </g>

  <path class="invalidate" d="M1330 490V580H650V694"/>
  <path class="invalidate" d="M920 580V694"/>
  <text class="label" x="980" y="568" text-anchor="middle" fill="#C2410C">remote instances evict L1</text>

  <g filter="url(#shadow)">
    <rect class="node" x="105" y="418" width="220" height="64" rx="16"/>
    <rect x="120" y="432" width="36" height="36" rx="10" fill="#EDE9FE"/>
    <path d="M138 439l10 4v8c0 7-4 12-10 15-6-3-10-8-10-15v-8z" fill="none" stroke="#7C3AED" stroke-width="2.2" stroke-linejoin="round"/>
    <text class="boundary-title" x="170" y="447">Circuit Breaker</text>
    <text class="tiny" x="170" y="469">Fallback on open</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="node" x="60" y="650" width="360" height="168" rx="22"/>
    <rect x="90" y="688" width="62" height="62" rx="16" fill="#DBEAFE"/>
    <path d="M106 719h30M121 704v30" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
    <text class="node-title" x="180" y="708">Kurly Source API</text>
    <text class="metric" x="180" y="738" fill="#1D4ED8">500 ms–1 s</text>
    <text class="node-subtitle" x="90" y="785">Called only after cache miss</text>
  </g>

  <path class="read" d="M215 393V418"/>
  <path class="read" d="M215 482V650"/>
  <text class="label" x="235" y="560">closed → call API</text>
  <path class="fallback" d="M105 452H78V370H105"/>
  <text class="label" x="86" y="408" fill="#6D28D9">open → fallback</text>

  <text class="tiny" x="60" y="872">Pub/Sub invalidation reduces stale local entries; TTL policies provide eventual convergence if an event is missed.</text>
</svg>
