  <text class="label" x="720" y="470" fill="#C2410C">evict → publish</text>

  <rect x="500" y="638" width="580" height="200" rx="24" fill="#FFFFFF" fill-opacity="0.78" stroke="#94A3B8" stroke-width="2"/>
  <rect x="526" y="618" width="286" height="42" rx="21" fill="#E2E8F0" stroke="#94A3B8"/>
  <circle cx="549" cy="639" r="7" fill="#475569"/>
