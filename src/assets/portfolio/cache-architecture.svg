<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Multi-level cache architecture</title>
  <desc id="description">The application reads and writes through CompositeCache, which checks Caffeine L1 before Redis L2. After both caches miss, a circuit breaker guards the call to the Kurly source API and returns a fallback response when open. Cache eviction events are published through Redis Pub/Sub so other application instances evict their local L1 entries. Eleven policy profiles define time-to-live values from 30 minutes to seven days and local cache size limits.</desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="caffeine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="redis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF1F2"/>
      <stop offset="1" stop-color="#FFE4E6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
