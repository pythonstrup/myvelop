    <text class="node-subtitle" x="614" y="373">Read L1 → L2 · write both</text>
  </g>

  <g filter="url(#shadow)" transform="translate(-60 0)">
    <rect x="840" y="248" width="200" height="172" rx="20" fill="url(#caffeine)" stroke="#6EE7B7" stroke-width="2"/>
    <circle cx="885" cy="294" r="23" fill="#059669"/>
